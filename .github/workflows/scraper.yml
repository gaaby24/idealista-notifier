name: Idealista Scraper

on:
  schedule:
    - cron: '0, 4, 8, 12,14, 18,20 * * *'  # 3 veces al día: 8h, 14h y 20h (UTC)
  workflow_dispatch:             # Botón para lanzarlo manualmente también

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/scraper.py

      - name: Guardar anuncios vistos (commit)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_listings.json
          git diff --staged --quiet || git commit -m "Update seen listings"
          git push
